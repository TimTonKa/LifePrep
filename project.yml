name: LifePrep
options:
  bundleIdPrefix: com.timtonka
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  LifePrep:
    type: application
    platform: iOS
    sources:
      - path: LifePrep
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timtonka.LifePrep
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: LifePrep/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          OTHER_SWIFT_FLAGS: "-DDEBUG"
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

schemes:
  LifePrep:
    build:
      targets:
        LifePrep: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
